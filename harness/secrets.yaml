# harness/secrets.yaml
#
# This file declares the SECRET REFERENCES used in pipeline.yaml and trigger.yaml.
# Actual values are stored in Harness Secrets Manager — never here.
#
# To create a secret in Harness:
#   UI:  Project → Setup → Secrets → + New Secret → Text
#   CLI: harness secret create --name <identifier> --value <value>
#
# Convention: identifier = snake_case, matches the getValue("...") calls in pipeline.yaml

secrets:

  # Anthropic
  - identifier: anthropic_api_key
    name: Anthropic API key
    description: "sk-ant-... key used by the agent to call Claude"
    type: SecretText
    spec:
      secretManagerIdentifier: harnessSecretManager
      valueType: Inline
      # value: SET_IN_HARNESS_UI — do not commit

  # GitHub
  - identifier: github_token
    name: GitHub personal access token
    description: "ghp_... token with repo + pull_requests scopes"
    type: SecretText
    spec:
      secretManagerIdentifier: harnessSecretManager
      valueType: Inline

  - identifier: github_repo
    name: GitHub repository
    description: "owner/repo-name, e.g. acme/backend"
    type: SecretText
    spec:
      secretManagerIdentifier: harnessSecretManager
      valueType: Inline

  # Agent webhook
  - identifier: agent_webhook_url
    name: Agent webhook base URL
    description: "Base URL of the deployed coding-agent service, e.g. https://agent.internal"
    type: SecretText
    spec:
      secretManagerIdentifier: harnessSecretManager
      valueType: Inline

  - identifier: webhook_secret
    name: Webhook HMAC secret
    description: "Shared secret used to sign and verify Harness → agent webhook calls"
    type: SecretText
    spec:
      secretManagerIdentifier: harnessSecretManager
      valueType: Inline

  # Harness self-reference (used by harness_client.py to re-trigger pipelines)
  - identifier: harness_api_key
    name: Harness API key
    description: "Service account API key with pipeline execute permission"
    type: SecretText
    spec:
      secretManagerIdentifier: harnessSecretManager
      valueType: Inline

  - identifier: harness_account_id
    name: Harness account ID
    description: "Found in Harness UI → Account Settings → Overview"
    type: SecretText
    spec:
      secretManagerIdentifier: harnessSecretManager
      valueType: Inline

  - identifier: harness_org_id
    name: Harness org ID
    description: "Organisation identifier in Harness"
    type: SecretText
    spec:
      secretManagerIdentifier: harnessSecretManager
      valueType: Inline

  - identifier: harness_project_id
    name: Harness project ID
    description: "Project identifier in Harness"
    type: SecretText
    spec:
      secretManagerIdentifier: harnessSecretManager
      valueType: Inline

  - identifier: harness_pipeline_id
    name: Harness pipeline ID
    description: "Pipeline identifier to re-trigger after an agent fix — usually coding-agent-pipeline"
    type: SecretText
    spec:
      secretManagerIdentifier: harnessSecretManager
      valueType: Inline
